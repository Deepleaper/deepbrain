<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:360px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3}
.header{padding:16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #30363d}
.header h1{font-size:16px;font-weight:600}
.header h1 span{color:#a78bfa}
.content{padding:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:#8b949e;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:8px 10px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:13px;outline:none}
.field input:focus,.field textarea:focus{border-color:#7c3aed}
.field textarea{height:80px;resize:vertical}
.btn{width:100%;padding:10px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:background .2s}
.btn:hover{background:#6d28d9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status{text-align:center;padding:8px;font-size:12px;margin-top:8px;border-radius:6px;display:none}
.status.success{display:block;background:#0d2818;color:#3fb950;border:1px solid #238636}
.status.error{display:block;background:#2d1315;color:#f85149;border:1px solid #da3633}
.settings{padding:8px 16px;border-top:1px solid #30363d;margin-top:8px}
.settings summary{font-size:11px;color:#8b949e;cursor:pointer}
</style>
</head>
<body>
<div class="header">
  <span style="font-size:24px">🧠</span>
  <h1>Deep<span>Brain</span> Clipper</h1>
</div>
<div class="content">
  <div class="field">
    <label>Slug (page name)</label>
    <input type="text" id="slug" placeholder="e.g. article-ai-trends">
  </div>
  <div class="field">
    <label>Title</label>
    <input type="text" id="title">
  </div>
  <div class="field">
    <label>Type</label>
    <select id="type">
      <option value="note">Note</option>
      <option value="article">Article</option>
      <option value="bookmark">Bookmark</option>
      <option value="reference">Reference</option>
    </select>
  </div>
  <div class="field">
    <label>Content (auto-filled from page)</label>
    <textarea id="content" placeholder="Page content or selected text..."></textarea>
  </div>
  <button class="btn" id="saveBtn">💾 Save to Brain</button>
  <div class="status" id="status"></div>
</div>
<details class="settings">
  <summary>⚙️ Settings</summary>
  <div style="padding:8px 0">
    <div class="field">
      <label>DeepBrain API URL</label>
      <input type="text" id="apiUrl" placeholder="http://localhost:3333">
    </div>
    <div class="field">
      <label>Brain name</label>
      <input type="text" id="brain" placeholder="default">
    </div>
    <button class="btn" id="saveSettings" style="background:#30363d;font-size:12px;padding:6px">Save Settings</button>
  </div>
</details>
<script src="popup.js"></script>
</body>
</html>
